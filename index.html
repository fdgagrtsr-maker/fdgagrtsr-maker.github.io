<!doctype html>

      --accent: #0f766e;

    .search input { min-width: 0; height: 44px; border: 1px solid rgba(43,58,103,.16); border-radius: 8px; padding: 0 12px; outline: 0; background: rgba(255,255,255,.96); }

    .workspace { display: grid; grid-template-columns: 278px minmax(0, 1fr); gap: 20px; align-items: stretch; }

    .toc-title { display: block; font-size: 14px; font-weight: 850; line-height: 1.35; }
    .tip-note { margin-top: auto; padding-top: 16px; color: #5c6670; font-size: 12px; line-height: 1.6; }
    .reader { position: relative; min-height: 570px; padding: 22px 22px 22px 34px; border: 1px solid rgba(43,58,103,.18); border-radius: 14px; background: linear-gradient(135deg, rgba(43,58,103,.16), rgba(255,255,255,.5) 42%, rgba(139,61,78,.14)); box-shadow: 0 30px 72px var(--shadow); overflow: hidden; }

    .reader::after { content: ""; position: absolute; right: 22px; bottom: 12px; left: 42px; height: 11px; border-radius: 999px; background: linear-gradient(90deg, rgba(43,58,103,.18), rgba(199,139,50,.28), rgba(139,61,78,.18)); opacity: .9; }
    .paper-stack { position: relative; min-height: 520px; height: 100%; margin-left: 14px; }

    .paper-stack::after { inset: 6px 0 0 6px; background: #f4efe8; opacity: .9; }
    .page { position: relative; z-index: 2; min-height: 520px; padding: clamp(28px, 4vw, 42px) clamp(24px, 4vw, 42px) 78px; border-radius: 12px; background: linear-gradient(180deg, rgba(43,58,103,.11) 0 8px, transparent 8px), linear-gradient(90deg, rgba(15,118,110,.09), transparent 20%), repeating-linear-gradient(0deg, transparent 0 31px, var(--paper-line) 32px), var(--paper); box-shadow: inset 0 0 0 1px rgba(43,58,103,.14), 0 18px 36px rgba(28,39,58,.13); overflow: hidden; transition: opacity .18s ease, transform .18s ease; }
    .page::before { content: ""; position: absolute; top: 0; right: 28px; width: 92px; height: 30px; border-radius: 0 0 8px 8px; background: linear-gradient(135deg, var(--cover), var(--cover-2)); box-shadow: 0 8px 18px rgba(28,39,58,.16); }
    .page.is-leaving { opacity: .2; transform: translateX(-10px); }

    .page-flash { position: absolute; inset: 22px 22px 22px 36px; z-index: 4; display: none; border-radius: 16px; background: linear-gradient(90deg, rgba(255,250,240,.98), rgba(255,250,240,.86)); box-shadow: 0 16px 32px rgba(24,32,38,.14); pointer-events: none; }
    .page-flash.active.forward { display: block; animation: sheetForward .3s ease-out forwards; }
    .page-flash.active.backward { display: block; animation: sheetBackward .3s ease-out forwards; }
    @keyframes sheetForward { from { opacity: .95; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(-34px) scale(.985); } }
    @keyframes sheetBackward { from { opacity: .95; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(34px) scale(.985); } }

    .channel { display: inline-block; margin-right: 4px; color: var(--accent); font-weight: 950; }
    mark { border-radius: 4px; padding: 1px 3px; color: inherit; background: rgba(199,139,50,.4); }
    .reader-footer { position: absolute; right: clamp(30px, 4vw, 54px); bottom: 28px; left: clamp(44px, 5vw, 68px); z-index: 5; display: grid; grid-template-columns: auto 1fr auto; gap: 13px; align-items: center; color: #66717c; font-size: 13px; font-weight: 800; }
    .progress { height: 8px; overflow: hidden; border-radius: 999px; background: rgba(43,58,103,.12); }

    .reader-actions { display: flex; gap: 10px; }
    .icon-btn { display: grid; place-items: center; width: 42px; height: 42px; border: 0; border-radius: 10px; color: #fff; font-size: 26px; line-height: 1; background: linear-gradient(135deg, var(--cover), var(--cover-2)); cursor: pointer; }

    .status { min-height: 0; margin-top: 8px; color: #4f5b66; font-size: 13px; text-align: right; }
    .internal-note { width: fit-content; margin: 16px auto 0; padding: 7px 13px; border: 1px solid rgba(21,66,61,.12); border-radius: 999px; color: rgba(31,42,51,.72); font-size: 12px; font-weight: 850; text-align: center; background: rgba(255,255,255,.56); }
    .mobile-tools, .mobile-drawer { display: none; }

      .status { text-align: left; font-size: 13px; }
      .internal-note { margin-top: 15px; padding: 7px 12px; font-size: 12px; }

                  "身份证件",
                  "人脸识别影像",
                  "投保人身份证件",
                  "投保人人脸识别影像",
                  "财务资料",
                  "反洗钱资料",
                  "涉及反洗钱时需要",
                  "批单"
            ],
            "content": [
                  "柜面保全：投保人身份证件、投保人人脸识别影像、财务资料、反洗钱资料（涉及反洗钱时需要）、批单。"
            ]
      },
      {
            "category": "保障变更",
            "title": "险种转换",
            "keywords": [
                  "险种转换",
                  "保障变更",
                  "柜面保全",
                  "微信保全",
                  "身份证件",
                  "人脸识别影像",
                  "投保人身份证件",
                  "投保人人脸识别影像",
                  "人身保险投保提示及投保人声明书",
                  "转保变更业务风险提示确认书",
                  "反洗钱资料",
                  "涉及反洗钱时需要",
                  "批单"
            ],
            "content": [
                  "柜面保全：投保人身份证件、投保人人脸识别影像、《人身保险投保提示及投保人声明书》、《转保变更业务风险提示确认书》、反洗钱资料（涉及反洗钱时需要）、批单。"
            ]
      }
];
    let currentPage = 0;
    let lastQuery = "";
    let isTurning = false;
    const $ = selector => document.querySelector(selector);
    const toc = $("#toc"), counter = $("#counter"), page = $("#page"), pageFlash = $("#pageFlash");
    const pageTag = $("#pageTag"), pageTitle = $("#pageTitle"), pageContent = $("#pageContent");
    const progressBar = $("#progressBar"), pageNumber = $("#pageNumber"), resultText = $("#resultText");
    const searchForm = $("#searchForm"), searchInput = $("#searchInput"), prevBtn = $("#prevBtn"), nextBtn = $("#nextBtn");
    const mobileTocBtn = $("#mobileTocBtn"), mobilePageMeta = $("#mobilePageMeta"), mobileCategory = $("#mobileCategory");
    const mobileToc = $("#mobileToc"), mobileDrawer = $("#mobileDrawer"), mobileDrawerClose = $("#mobileDrawerClose"), drawerBackdrop = $("#drawerBackdrop");
    function escapeHtml(value) { return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    function escapeRegExp(value) { return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
    function highlight(value, query) {
      const safeValue = escapeHtml(value);
      if (!query) return safeValue;
      return safeValue.replace(new RegExp(`(${escapeRegExp(escapeHtml(query))})`, "gi"), "<mark>$1</mark>");
    }
    function getTipChannels(tip) {
      const joined = tip.content.join(" ");
      return ["微信保全", "柜面保全"].filter(channel => joined.includes(`${channel}：`));
    }
    function getTocGroups() {
      const groups = new Map([["微信保全", []], ["柜面保全", []]]);
      tips.forEach((tip, index) => {
        getTipChannels(tip).forEach(channel => groups.get(channel).push({ tip, index }));
      });
      return [...groups.entries()].filter(([, items]) => items.length);
    }
    function renderToc() {
      counter.textContent = `${tips.length} 页`;
      const groups = getTocGroups();
      toc.innerHTML = groups.map(([channel, items]) => `
        <li class="toc-group">
          <div class="toc-category">${escapeHtml(channel)}</div>
          ${items.map(({ tip, index }) => `
            <button type="button" data-index="${index}">
              <span class="toc-title">${index + 1}. ${escapeHtml(tip.title)}</span>
            </button>
          `).join("")}
        </li>
      `).join("");
      mobileToc.innerHTML = groups.map(([channel, items]) => `<div class="mobile-toc-group"><div class="mobile-toc-group-title">${escapeHtml(channel)}</div>${items.map(({ tip, index }) => `<button type="button" data-index="${index}">${index + 1}. ${escapeHtml(tip.title)}</button>`).join("")}</div>`).join("");
    }
    function setButtons() {
      prevBtn.disabled = currentPage === 0 || isTurning;
      nextBtn.disabled = currentPage === tips.length - 1 || isTurning;
      toc.querySelectorAll("button").forEach(button => { button.classList.toggle("active", Number(button.dataset.index) === currentPage); button.disabled = isTurning; });
      mobileToc.querySelectorAll("button").forEach(button => { button.classList.toggle("active", Number(button.dataset.index) === currentPage); button.disabled = isTurning; });
    }
    function formatItem(item, query) {
      const match = String(item).match(/^(柜面保全|微信保全)：(.+)$/);
      if (!match) return highlight(item, query);
      return `<span class="channel">${highlight(match[1], query)}：</span>${highlight(match[2], query)}`;
    }
    function renderPage() {
      const tip = tips[currentPage], query = lastQuery.trim();
      pageTag.textContent = tip.category;
      pageTitle.innerHTML = highlight(tip.title, query);
      pageContent.innerHTML = `<ul>${tip.content.map(item => `<li>${formatItem(item, query)}</li>`).join("")}</ul>`;
      progressBar.style.setProperty("--progress", `${((currentPage + 1) / tips.length) * 100}%`);
      pageNumber.textContent = `${currentPage + 1} / ${tips.length}`;
      mobilePageMeta.textContent = `${currentPage + 1} / ${tips.length}  ${tip.title}`;
      mobileCategory.textContent = tip.category;
      setButtons();
    }
    function openMobileDrawer() { mobileDrawer.classList.add("open"); drawerBackdrop.classList.add("open"); mobileDrawer.setAttribute("aria-hidden", "false"); }
    function closeMobileDrawer() { mobileDrawer.classList.remove("open"); drawerBackdrop.classList.remove("open"); mobileDrawer.setAttribute("aria-hidden", "true"); }
    function playTurn(toIndex, direction) {
      isTurning = true; setButtons(); page.classList.add("is-leaving"); pageFlash.className = `page-flash active ${direction}`;
      window.setTimeout(() => { currentPage = toIndex; renderPage(); page.classList.remove("is-leaving"); page.classList.add("is-entering"); }, 140);
      window.setTimeout(() => { pageFlash.className = "page-flash"; page.classList.remove("is-entering"); isTurning = false; setButtons(); }, 330);
    }
    function goToPage(index, keepQuery = false) {
      if (isTurning) return;
      const nextIndex = Math.max(0, Math.min(index, tips.length - 1));
      if (!keepQuery) lastQuery = "";
      if (nextIndex === currentPage) { renderPage(); return; }
      playTurn(nextIndex, nextIndex > currentPage ? "forward" : "backward");
    }
    function movePage(step) { resultText.textContent = ""; searchInput.value = ""; goToPage(currentPage + step); }
    function searchTips(query) {
      const normalized = query.trim().toLowerCase();
      if (!normalized) { resultText.textContent = "请输入要搜索的知识点。"; return; }
      const foundIndex = tips.findIndex(tip => [tip.category, tip.title, tip.keywords.join(" "), tip.content.join(" ")].join(" ").toLowerCase().includes(normalized));
      if (foundIndex === -1) { resultText.textContent = `没有找到“${query}”。`; return; }
      lastQuery = query.trim();
      resultText.textContent = `已跳转到第 ${foundIndex + 1} 页：${tips[foundIndex].title}`;
      goToPage(foundIndex, true);
    }
    toc.addEventListener("click", event => { const button = event.target.closest("button[data-index]"); if (!button) return; resultText.textContent = ""; searchInput.value = ""; goToPage(Number(button.dataset.index)); });
    mobileToc.addEventListener("click", event => { const button = event.target.closest("button[data-index]"); if (!button) return; resultText.textContent = ""; searchInput.value = ""; closeMobileDrawer(); goToPage(Number(button.dataset.index)); });
    searchForm.addEventListener("submit", event => { event.preventDefault(); searchTips(searchInput.value); });
    prevBtn.addEventListener("click", () => movePage(-1));
    nextBtn.addEventListener("click", () => movePage(1));
    mobileTocBtn.addEventListener("click", openMobileDrawer);
    mobileDrawerClose.addEventListener("click", closeMobileDrawer);
    drawerBackdrop.addEventListener("click", closeMobileDrawer);
    document.addEventListener("keydown", event => { if (event.target === searchInput) return; if (event.key === "Escape") closeMobileDrawer(); if (event.key === "ArrowLeft") movePage(-1); if (event.key === "ArrowRight") movePage(1); });
    renderToc();
    renderPage();
  </script>
</body>
</html>
